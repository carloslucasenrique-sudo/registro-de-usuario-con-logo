<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background: #f4f7f6;
            color: #333;
        }

        header {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 1.5rem 1rem;
        }

        .logo {
            width: 60px;
            height: 60px;
            margin-bottom: 0.8rem;
            border-radius: 8px;
        }

        main {
            max-width: 500px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .registro-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .perfil-container {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .perfil-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #3498db;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #2c3e50;
        }

        input, select {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
        }

        input[type="color"] {
            height: 50px;
            padding: 0.3rem;
            cursor: pointer;
        }

        input:invalid {
            border-color: #e74c3c;
        }

        .error-msg {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 0.3rem;
            display: none;
        }

        input:invalid + .error-msg {
            display: block;
        }

        button {
            width: 100%;
            padding: 1rem;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #2980b9;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            background: #2c3e50;
            color: white;
            margin-top: 3rem;
        }

        /* Diseño responsivo */
        @media (max-width: 600px) {
            main {
                margin: 1rem auto;
            }
            .registro-card {
                padding: 1.5rem;
            }
            header {
                padding: 1.2rem 1rem;
            }
            header h1 {
                font-size: 1.4rem;
            }
            .logo {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <header>
        <img src="https://via.placeholder.com/60x60.png?text=LOGO" 
             alt="Logotipo de la empresa" 
             class="logo">
        <h1>Crear cuenta nueva</h1>
        <p>Únete a nuestra comunidad</p>
    </header>

    <main>
        <section class="registro-card">
            <div class="perfil-container">
                <img src="https://via.placeholder.com/100x100.png?text=Foto" 
                     alt="Imagen de perfil del usuario" 
                     class="perfil-img">
            </div>

            <form id="formRegistro">
                <div class="form-group">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" 
                           minlength="8" required>
                    <span class="error-msg">La contraseña debe tener mínimo 8 caracteres</span>
                </div>

                <div class="form-group">
                    <label for="fechaNacimiento">Fecha de nacimiento</label>
                    <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
                </div>

                <div class="form-group">
                    <label for="pais">País</label>
                    <input list="listaPaises" id="pais" name="pais" required placeholder="Selecciona tu país">
                    <datalist id="listaPaises">
                        <option value="México">
                        <option value="Colombia">
                        <option value="Argentina">
                        <option value="España">
                        <option value="Perú">
                        <option value="Chile">
                        <option value="Ecuador">
                        <option value="Venezuela">
                        <option value="Estados Unidos">
                        <option value="Canadá">
                    </datalist>
                </div>

                <div class="form-group">
                    <label for="colorFavorito">Color favorito</label>
                    <input type="color" id="colorFavorito" name="colorFavorito" value="#3498db">
                </div>

                <button type="submit">Registrarme</button>
            </form>
